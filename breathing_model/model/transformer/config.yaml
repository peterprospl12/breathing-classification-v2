data:
  data_dir: "../../data/train/raw"
  label_dir: "../../data/train/label"
  sample_rate: 44100
  n_mels: 128
  hop_length: 512
  n_fft: 2048

augment:
  enabled: true
  p_noise: 0.3
  p_volume: 0.3
  p_shift: 0.2
  volume_range: [0.3, 1.0]
  noise_factor_range: [0.00001, 0.001]
  max_shift_seconds: 0.3
  seed: 123456
  # SpecAugment
  freq_mask_param: 15
  time_mask_param: 25
  num_freq_masks: 2
  num_time_masks: 2

audio:
  channels: 1
  chunk_length: 0.2
  device_index: 2
  sample_rate: 44100

train:
  batch_size: 16
  learning_rate: 0.0003
  weight_decay: 0.0001
  num_epochs: 80
  patience: 12
  save_dir: "checkpoints2"
  label_smoothing: 0.1
  gradient_clip_norm: 1.0
  # --- Advanced training options ---
  loss_type: "focal"       # "cross_entropy" or "focal"
  focal_gamma: 2.0         # Focal loss gamma (only used when loss_type=focal)
  mixup_alpha: 0.3         # Mixup alpha (0 = disabled, 0.2-0.4 recommended)
  swa_start_epoch: 50      # Start SWA from this epoch (0 = disabled)
  swa_lr: 0.0001           # SWA learning rate

scheduler:
  type: "onecycle"   # onecycle / steplr
  max_lr: 0.0003
  pct_start: 0.3
  anneal_strategy: "cos"
  div_factor: 25
  final_div_factor: 10000
  step_size: 5        # tylko dla StepLR
  gamma: 0.5          # tylko dla StepLR

model:
  num_classes: 3
  n_mels: 128
  d_model: 256
  nhead: 8
  num_layers: 6
  dim_feedforward: 1024
  dropout: 0.15

plot:
  history_seconds: 5
  update_interval: 0.3
